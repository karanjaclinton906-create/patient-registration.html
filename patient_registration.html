<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Patient Registration Form</h1>
    <p>please fill out the form below to register as a new patient:</p>
    <form action="/submit_registration" method="post">
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="gender">Gender:</label><br>
        <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>
        <label for="service">Service:</label><br>
        <select id="service" name="service" required>
            <option value="">Select Service</option>
            <option value="general_consultation">General Consultation</option>
            <option value="labaratory">Laboratory test</option>
            <option value="pharmacy">Pharmacy</option>
        </select><br><br>
        <label for="county">County of residence</label><br>
        <select id="county" name="county" required>
            <option value="">Select County</option>
            <option value="nairobi">Nairobi</option>
            <option value="kiambu">Kiambu</option>
            <option value="machakos">Machakos</option>
        </select><br><br>
        <label for="comments">Additional Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Enter any additional comments here..."></textarea><br><br>
        <input type ="submit" value="Submit">
        <input type="reset" value="reset">
    </form>
</body>
</html>
